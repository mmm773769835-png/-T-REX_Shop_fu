<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر تي-ريكس - T-REX Shop</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }
        .header {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,215,0,0.2);
        }
        .logo {
            font-size: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-text {
            color: #ffd700;
            font-size: 1.5rem;
            font-weight: bold;
        }
        .nav-buttons {
            display: flex;
            gap: 10px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a1a2e;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        .container {
            padding: 40px 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .section-title {
            text-align: center;
            font-size: 2rem;
            color: #ffd700;
            margin-bottom: 30px;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }
        .product-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,215,0,0.1);
            transition: all 0.3s ease;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.2);
            border-color: rgba(255,215,0,0.3);
        }
        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #0a0a1a;
        }
        .product-info {
            padding: 20px;
        }
        .product-name {
            font-size: 1.2rem;
            color: #ffd700;
            margin-bottom: 10px;
        }
        .product-description {
            color: #ccc;
            font-size: 0.9rem;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        .product-price {
            font-size: 1.5rem;
            color: #00ff88;
            font-weight: bold;
        }
        .product-category {
            display: inline-block;
            background: rgba(255,215,0,0.2);
            color: #ffd700;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 10px;
        }
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
        }
        .error {
            text-align: center;
            padding: 50px;
            color: #ff4444;
        }
        .empty {
            text-align: center;
            padding: 50px;
            color: #888;
        }
        /* Admin Panel Styles */
        .admin-panel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(26, 26, 46, 0.98);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #ffd700;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            z-index: 1000;
            min-width: 400px;
            max-width: 90vw;
            max-height: 90vh;
            overflow-y: auto;
        }
        .admin-panel.active {
            display: block;
        }
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 999;
        }
        .overlay.active {
            display: block;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ffd700;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 1rem;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #ffd700;
        }
        .close-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            background: none;
            border: none;
            color: #ff4444;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .admin-badge {
            background: #00ff88;
            color: #1a1a2e;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-right: 10px;
        }
        .login-form {
            max-width: 400px;
            margin: 100px auto;
            background: rgba(255,255,255,0.05);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255,215,0,0.2);
        }
        .success-message {
            background: rgba(0,255,136,0.2);
            color: #00ff88;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        .error-message {
            background: rgba(255,68,68,0.2);
            color: #ff4444;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        footer {
            text-align: center;
            padding: 30px;
            color: #888;
            border-top: 1px solid rgba(255,215,0,0.1);
            margin-top: 50px;
        }
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="overlay" id="overlay"></div>
    
    <!-- Admin Login Panel -->
    <div class="admin-panel" id="loginPanel">
        <button class="close-btn" onclick="closePanels()">✕</button>
        <h2 style="color: #ffd700; margin-bottom: 30px; text-align: center;">🔐 تسجيل دخول الأدمن</h2>
        <div id="loginMessages"></div>
        <form id="adminLoginForm">
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="adminEmail" required placeholder="admin@trex-shop.com">
            </div>
            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" id="adminPassword" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">تسجيل الدخول</button>
        </form>
    </div>

    <!-- Add Product Panel -->
    <div class="admin-panel" id="productPanel">
        <button class="close-btn" onclick="closePanels()">✕</button>
        <h2 style="color: #ffd700; margin-bottom: 30px; text-align: center;">➕ إضافة منتج جديد</h2>
        <div id="productMessages"></div>
        <form id="addProductForm">
            <div class="form-group">
                <label>اسم المنتج *</label>
                <input type="text" id="productName" required placeholder="مثال: هاتف iPhone 15">
            </div>
            <div class="form-group">
                <label>السعر *</label>
                <input type="number" id="productPrice" required min="0" step="0.01" placeholder="299.99">
            </div>
            <div class="form-group">
                <label>الوصف</label>
                <textarea id="productDescription" rows="3" placeholder="وصف المنتج..."></textarea>
            </div>
            <div class="form-group">
                <label>رابط الصورة</label>
                <input type="url" id="productImage" placeholder="https://example.com/image.jpg">
            </div>
            <div class="form-group">
                <label>القسم</label>
                <select id="productCategory">
                    <option value="إلكترونيات">📱 إلكترونيات</option>
                    <option value="ملابس">👕 ملابس</option>
                    <option value="أحذية">👟 أحذية</option>
                    <option value="إكسسوارات">⌚ إكسسوارات</option>
                    <option value="كتب">📚 كتب</option>
                    <option value="منزل">🏠 منزل</option>
                </select>
            </div>
            <div class="form-group">
                <label>طريقة الدفع</label>
                <select id="productPayment">
                    <option value="cash">💵 نقدي</option>
                    <option value="transfer">🏦 تحويل بنكي</option>
                    <option value="online">💳 إلكتروني</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">إضافة المنتج</button>
        </form>
    </div>

    <div class="header">
        <div class="logo">
            🦖
            <span class="logo-text">T-REX Shop</span>
        </div>
        <div class="nav-buttons">
            <span id="adminBadge" class="admin-badge" style="display: none;">👤 الأدمن</span>
            <button class="btn btn-secondary" id="loginBtn" onclick="showLoginPanel()">🔐 دخول الأدمن</button>
            <button class="btn btn-primary" id="addProductBtn" onclick="showProductPanel()" style="display: none;">➕ إضافة منتج</button>
            <button class="btn btn-secondary" id="logoutBtn" onclick="logoutAdmin()" style="display: none;">🚪 خروج</button>
        </div>
    </div>

    <div class="container">
        <h2 class="section-title">🛍️ منتجاتنا</h2>
        <div id="productsContainer">
            <div class="loading">⏳ جاري تحميل المنتجات...</div>
        </div>
    </div>

    <footer>
        <p>© 2025 متجر تي-ريكس - T-REX Shop. جميع الحقوق محفوظة.</p>
        <p style="margin-top: 10px; font-size: 0.8rem;">🔗 متصل بـ Supabase | 🔐 آمن ومشفر</p>
    </footer>

    <script>
        // Supabase Configuration - من متغيرات البيئة أو الإعدادات
        const SUPABASE_URL = window.ENV?.SUPABASE_URL || 'https://udqnrsrwzifrzseixrcj.supabase.co';
        const SUPABASE_ANON_KEY = window.ENV?.SUPABASE_ANON_KEY || 'sb_publishable_cNZtDBzqP3gGDMxJsvcvuA_iYOO-d4e';
        
        // Initialize Supabase
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentAdmin = null;
        
        // Load products on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadProducts();
            checkAdminSession();
        });
        
        // Load products from Supabase
        async function loadProducts() {
            const container = document.getElementById('productsContainer');
            
            try {
                const { data: products, error } = await supabase
                    .from('products')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (error) {
                    throw error;
                }
                
                if (!products || products.length === 0) {
                    container.innerHTML = `
                        <div class="empty">
                            <p>🛒 لا توجد منتجات حالياً</p>
                            <p style="margin-top: 10px;">سيتم إضافة منتجات قريباً!</p>
                        </div>
                    `;
                    return;
                }
                
                // Render products grid
                container.innerHTML = `
                    <div class="products-grid">
                        ${products.map(product => `
                            <div class="product-card">
                                <img src="${product.image_url || 'https://via.placeholder.com/300x200?text=No+Image'}" 
                                     alt="${product.name}" 
                                     class="product-image"
                                     onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'">
                                <div class="product-info">
                                    <h3 class="product-name">${product.name}</h3>
                                    <p class="product-description">${product.description || 'لا يوجد وصف'}</p>
                                    <div class="product-price">
                                        ${product.price} ${product.currency || 'ر.ي'}
                                    </div>
                                    <span class="product-category">${product.category || 'غير مصنف'}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <p style="text-align: center; margin-top: 30px; color: #888;">
                        📦 ${products.length} منتج متوفر
                    </p>
                `;
                
            } catch (error) {
                console.error('Error loading products:', error);
                container.innerHTML = `
                    <div class="error">
                        <p>❌ حدث خطأ في تحميل المنتجات</p>
                        <p style="font-size: 0.9rem; margin-top: 10px;">${error.message}</p>
                        <button onclick="loadProducts()" class="btn btn-primary" style="margin-top: 20px;">
                            🔄 إعادة المحاولة
                        </button>
                    </div>
                `;
            }
        }
        
        // Show/Hide Panels
        function showLoginPanel() {
            document.getElementById('overlay').classList.add('active');
            document.getElementById('loginPanel').classList.add('active');
        }
        
        function showProductPanel() {
            if (!currentAdmin) {
                showMessage('loginMessages', 'يجب تسجيل الدخول كأدمن أولاً', 'error');
                showLoginPanel();
                return;
            }
            document.getElementById('overlay').classList.add('active');
            document.getElementById('productPanel').classList.add('active');
        }
        
        function closePanels() {
            document.getElementById('overlay').classList.remove('active');
            document.querySelectorAll('.admin-panel').forEach(panel => {
                panel.classList.remove('active');
            });
        }
        
        // Admin Login
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });
                
                if (error) throw error;
                
                // Check if user is admin
                const { data: userData, error: userError } = await supabase
                    .from('users')
                    .select('role')
                    .eq('email', email)
                    .single();
                
                if (userError || userData?.role !== 'admin') {
                    await supabase.auth.signOut();
                    throw new Error('غير مصرح. هذا الحساب ليس له صلاحية الأدمن.');
                }
                
                currentAdmin = data.user;
                showMessage('loginMessages', '✅ تم تسجيل الدخول بنجاح!', 'success');
                
                setTimeout(() => {
                    closePanels();
                    updateUIForAdmin();
                }, 1500);
                
            } catch (error) {
                console.error('Login error:', error);
                showMessage('loginMessages', error.message, 'error');
            }
        });
        
        // Add Product
        document.getElementById('addProductForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!currentAdmin) {
                showMessage('productMessages', 'يجب تسجيل الدخول أولاً', 'error');
                return;
            }
            
            const productData = {
                name: document.getElementById('productName').value,
                price: parseFloat(document.getElementById('productPrice').value),
                description: document.getElementById('productDescription').value,
                image_url: document.getElementById('productImage').value,
                category: document.getElementById('productCategory').value,
                payment_method: document.getElementById('productPayment').value,
                currency: 'YER',
                created_at: new Date().toISOString(),
                updated_at: new Date().toISOString()
            };
            
            try {
                const { data, error } = await supabase
                    .from('products')
                    .insert([productData])
                    .select();
                
                if (error) throw error;
                
                showMessage('productMessages', '✅ تم إضافة المنتج بنجاح!', 'success');
                document.getElementById('addProductForm').reset();
                
                setTimeout(() => {
                    closePanels();
                    loadProducts(); // Refresh products
                }, 1500);
                
            } catch (error) {
                console.error('Error adding product:', error);
                showMessage('productMessages', error.message, 'error');
            }
        });
        
        // Update UI for Admin
        function updateUIForAdmin() {
            document.getElementById('adminBadge').style.display = 'inline-block';
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('addProductBtn').style.display = 'inline-block';
            document.getElementById('logoutBtn').style.display = 'inline-block';
        }
        
        // Logout
        async function logoutAdmin() {
            await supabase.auth.signOut();
            currentAdmin = null;
            document.getElementById('adminBadge').style.display = 'none';
            document.getElementById('loginBtn').style.display = 'inline-block';
            document.getElementById('addProductBtn').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'none';
        }
        
        // Check existing session
        async function checkAdminSession() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                currentAdmin = user;
                updateUIForAdmin();
            }
        }
        
        // Show messages
        function showMessage(containerId, message, type) {
            const container = document.getElementById(containerId);
            container.innerHTML = `
                <div class="${type === 'success' ? 'success-message' : 'error-message'}">
                    ${message}
                </div>
            `;
        }
        
        // Close panels on overlay click
        document.getElementById('overlay').addEventListener('click', closePanels);
        
        // Load env variables from window.ENV (set by Vercel or server)
        if (typeof window.ENV === 'undefined') {
            window.ENV = {};
        }
    </script>
</body>
</html>
