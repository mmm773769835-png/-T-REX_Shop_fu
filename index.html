<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="T-REX Shop - أفضل منتجات بأسعار مميزة">
    <title>T-REX Shop | متجرك الإلكتروني</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2.39.3"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #FFD700;
            --secondary: #FF6B35;
            --dark: #0a0a0a;
            --darker: #050505;
            --card: #1a1a1a;
            --text: #ffffff;
            --text-muted: #888;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--darker);
            color: var(--text);
            min-height: 100vh;
        }
        /* Header */
        .header {
            background: linear-gradient(135deg, var(--dark) 0%, #1f1f1f 100%);
            padding: 15px 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }
        .logo i { margin-left: 10px; }
        .nav-links {
            display: flex;
            gap: 30px;
            align-items: center;
        }
        .nav-links a {
            color: var(--text);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }
        .nav-links a:hover { color: var(--primary); }
        .cart-btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: var(--dark) !important;
            padding: 10px 20px;
            border-radius: 25px;
            position: relative;
        }
        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ff4444;
            color: white;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Hero Section */
        .hero {
            margin-top: 70px;
            padding: 80px 20px;
            text-align: center;
            background: linear-gradient(135deg, var(--dark) 0%, #1a1a2e 50%, var(--darker) 100%);
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="none" stroke="%23FFD700" stroke-width="0.5" opacity="0.1"/></svg>') repeat;
            background-size: 100px;
            opacity: 0.3;
        }
        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
        }
        .hero h1 {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--primary) 0%, #fff 50%, var(--secondary) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero p {
            font-size: 20px;
            color: var(--text-muted);
            margin-bottom: 30px;
        }
        .cta-btn {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: var(--dark);
            padding: 15px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 700;
            font-size: 18px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .cta-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
        }
        /* Products Section */
        .products-section {
            padding: 60px 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .section-title {
            text-align: center;
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 40px;
            color: var(--primary);
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }
        .product-card {
            background: var(--card);
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid #333;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(255, 215, 0, 0.15);
        }
        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: linear-gradient(135deg, #2a2a2a 0%, #1f1f1f 100%);
        }
        .product-info {
            padding: 20px;
        }
        .product-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text);
        }
        .product-price {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 15px;
        }
        .add-to-cart {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: var(--dark);
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .add-to-cart:hover { opacity: 0.9; }
        /* Loading & Empty States */
        .loading {
            text-align: center;
            padding: 60px;
            font-size: 18px;
            color: var(--text-muted);
        }
        .loading i {
            font-size: 40px;
            color: var(--primary);
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }
        .empty-state i {
            font-size: 60px;
            margin-bottom: 20px;
            color: #444;
        }
        /* Footer */
        .footer {
            background: var(--dark);
            padding: 40px 20px;
            text-align: center;
            border-top: 1px solid #333;
            margin-top: 60px;
        }
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .footer-links a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.3s;
        }
        .footer-links a:hover { color: var(--primary); }
        .copyright {
            color: var(--text-muted);
            font-size: 14px;
        }
        /* Admin Link */
        .admin-link {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(255,255,255,0.1);
            padding: 10px 15px;
            border-radius: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 12px;
            transition: all 0.3s;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }
        .admin-link:hover {
            background: var(--primary);
            color: var(--dark);
        }
        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 { font-size: 32px; }
            .nav-links { display: none; }
            .mobile-menu { display: block; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <a href="/" class="logo">
                <i class="fas fa-rocket"></i> T-REX Shop
            </a>
            <nav class="nav-links">
                <a href="/">الرئيسية</a>
                <a href="#products">المنتجات</a>
                <a href="/admin.html" class="cart-btn">
                    <i class="fas fa-shield-alt"></i> لوحة التحكم
                </a>
            </nav>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>🦖 T-REX Shop</h1>
            <p>اكتشف أفضل المنتجات بأسعار مميزة. تسوق الآن واستمتع بتجربة فريدة!</p>
            <a href="#products" class="cta-btn">
                <i class="fas fa-shopping-bag"></i> تسوق الآن
            </a>
        </div>
    </section>

    <!-- Products Section -->
    <section class="products-section" id="products">
        <h2 class="section-title">
            <i class="fas fa-fire"></i> منتجاتنا المميزة
        </h2>
        <div id="products-container" class="products-grid">
            <div class="loading">
                <i class="fas fa-spinner"></i>
                <p>جاري تحميل المنتجات...</p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-links">
            <a href="/">الرئيسية</a>
            <a href="#products">المنتجات</a>
            <a href="/admin.html">لوحة التحكم</a>
        </div>
        <p class="copyright">
            © 2026 T-REX Shop. جميع الحقوق محفوظة.
        </p>
    </footer>

    <!-- Admin Quick Link -->
    <a href="/admin.html" class="admin-link">
        <i class="fas fa-lock"></i> دخول المدير
    </a>

    <script>
        // Supabase Config
        const SUPABASE_URL = 'https://aelgpjznwbaurzskeohr.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFlbGdwanpud2JhdXJ6c2tlb2hyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDYzMjYwMTIsImV4cCI6MjA2MTkwMjAxMn0.UV0spKRZ6dD0NZRE6I9-8uloFIeZOhEQaybn3iB3rEI';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Load Products
        async function loadProducts() {
            const container = document.getElementById('products-container');
            
            try {
                const { data: products, error } = await supabase
                    .from('products')
                    .select('*')
                    .eq('is_active', true)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!products || products.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state" style="grid-column: 1/-1;">
                            <i class="fas fa-box-open"></i>
                            <h3>لا توجد منتجات حالياً</h3>
                            <p>سيتم إضافة منتجات قريباً!</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = products.map(product => `
                    <div class="product-card">
                        <img src="${product.image_url || 'https://via.placeholder.com/300x200/1a1a1a/FFD700?text=No+Image'}" 
                             alt="${product.name}" 
                             class="product-image"
                             onerror="this.src='https://via.placeholder.com/300x200/1a1a1a/FFD700?text=No+Image'">
                        <div class="product-info">
                            <h3 class="product-name">${product.name}</h3>
                            <p class="product-price">
                                ${product.price} ${product.currency || 'ريال'}
                            </p>
                            <button class="add-to-cart" onclick="addToCart(${product.id})">
                                <i class="fas fa-cart-plus"></i> أضف للسلة
                            </button>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                console.error('Error loading products:', error);
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>حدث خطأ في تحميل المنتجات</h3>
                        <p>يرجى المحاولة مرة أخرى لاحقاً</p>
                    </div>
                `;
            }
        }

        // Add to Cart (placeholder)
        function addToCart(productId) {
            alert('تم إضافة المنتج للسلة! (ميزة السلة قيد التطوير)');
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', loadProducts);
    </script>
</body>
</html>
