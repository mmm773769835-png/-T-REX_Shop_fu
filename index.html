<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر تي-ريكس - قادم قريبًا</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        .container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
        }
        .logo {
            font-size: 80px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        h2 {
            font-size: 2rem;
            margin-bottom: 30px;
            color: #fff;
        }
        p {
            font-size: 1.2rem;
            line-height: 1.8;
            margin-bottom: 40px;
            color: #e0e0e0;
        }
        .app-link {
            display: inline-block;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a1a2e;
            padding: 18px 50px;
            font-size: 1.3rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
            transition: all 0.3s ease;
        }
        .app-link:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(255, 215, 0, 0.5);
        }
        .features {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 50px;
            flex-wrap: wrap;
        }
        .feature {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        .feature-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        .coming-soon-badge {
            display: inline-block;
            background: #ff4444;
            color: #fff;
            padding: 10px 30px;
            border-radius: 25px;
            font-weight: bold;
            margin-bottom: 30px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        footer {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #888;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🦖</div>
        <div class="coming-soon-badge">قادم قريبًا</div>
        <h1>متجر تي-ريكس</h1>
        <h2>T-REX Shop</h2>
        <p>
            تجربة تسوق ممتعة وآمنة<br>
            منتجات متنوعة بأسعار مميزة<br>
            مع خدمة توصيل سريعة
        </p>
        <a href="https://trex-shop.com" class="app-link">
            📱 تحميل التطبيق
        </a>
        <div class="features">
            <div class="feature">
                <div class="feature-icon">🛒</div>
                <div>تسوق سهل</div>
            </div>
            <div class="feature">
                <div class="feature-icon">💰</div>
                <div>أسعار مميزة</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🚚</div>
                <div>توصيل سريع</div>
            </div>
        </div>
    </div>
    <footer>
        © 2025 متجر تي-ريكس - T-REX Shop. جميع الحقوق محفوظة.
    </footer>
</body>
</html>
